<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPADE MCP Client</title>
    <link rel="stylesheet" href="index.css">
    <script defer src="index.js"></script>
</head>
<body>
    <h1>SPADE MCP Client</h1>

    <div id="chat">
        <div class="message assistant"><span>Hello. How can I help you?</span></div>
    </div>

    <form id="chat-form">
        <textarea id="query" name="query" rows="4" placeholder="Enter query..."></textarea>
        <div class="button-row">
            <button type="submit" data-path="/test_echo">Test Echo</button>
            <button type="submit" data-path="/test_sleep">Test Sleep</button>
            <button type="submit" data-path="/query">Query</button>
        </div>
    </form>
</body>
</html>
